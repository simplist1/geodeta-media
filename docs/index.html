<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Geodeta Media">
  <title>Geodeta Media</title>
  <style>
    :root{color-scheme:light;--bg:#f5f5f7;--card:rgba(255,255,255,.9);--text:#111114;--muted:#77777f;--line:rgba(20,20,25,.08);--accent:#5b5ce2;--accent-soft:rgba(91,92,226,.12);--shadow:0 12px 35px rgba(30,30,40,.08);--ease:cubic-bezier(.22,1,.36,1)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif;background:radial-gradient(circle at top right,rgba(91,92,226,.09),transparent 34rem),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:calc(92px + env(safe-area-inset-bottom));overflow-x:hidden}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}.app{width:min(100%,760px);margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 18px 24px}.view{display:none;opacity:0;transform:translateX(18px)}.view.active{display:block;animation:viewIn .42s var(--ease) forwards}@keyframes viewIn{to{opacity:1;transform:none}}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px}.eyebrow{margin:0 0 4px;color:var(--muted);font-size:13px;font-weight:650;letter-spacing:.02em}h1{margin:0;font-size:clamp(30px,8vw,44px);line-height:.98;letter-spacing:-.045em}.avatar,.icon-button{border:0;background:rgba(255,255,255,.78);color:var(--text);box-shadow:var(--shadow);cursor:pointer;display:grid;place-items:center}.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(145deg,#212126,#65656f);color:white;font-weight:750}.icon-button{width:42px;height:42px;border-radius:14px}.search-wrap{position:relative;margin-bottom:20px}.search-wrap>svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}.search{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 16px 14px 44px;background:rgba(255,255,255,.74);color:var(--text);outline:none;box-shadow:0 4px 20px rgba(20,20,30,.035);backdrop-filter:blur(18px);transition:border-color .2s ease,box-shadow .2s ease,transform .2s var(--ease)}.search:focus{border-color:rgba(91,92,226,.35);box-shadow:0 0 0 4px rgba(91,92,226,.08);transform:translateY(-1px)}.section-head{display:flex;align-items:end;justify-content:space-between;margin:25px 2px 12px}.section-head h2{margin:0;font-size:20px;letter-spacing:-.025em}.text-button{border:0;background:transparent;color:var(--accent);font-weight:650;cursor:pointer;padding:4px}.groups{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.group-card{position:relative;min-height:132px;border:1px solid var(--line);border-radius:24px;padding:16px;overflow:hidden;text-align:left;background:var(--card);box-shadow:0 8px 30px rgba(25,25,35,.05);cursor:pointer;transition:transform .22s var(--ease),border-color .22s ease,box-shadow .22s ease}.group-card:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(25,25,35,.08)}.group-card:active{transform:scale(.975)}.group-icon{width:42px;height:42px;display:grid;place-items:center;border-radius:14px;background:var(--accent-soft);color:var(--accent);margin-bottom:18px}.group-card strong{display:block;font-size:17px;letter-spacing:-.015em;margin-bottom:3px}.group-card .count{color:var(--muted);font-size:13px}.collection-delete{position:absolute;top:11px;right:11px;width:27px;height:27px;border:0;border-radius:50%;display:grid;place-items:center;background:rgba(120,120,128,.12);color:var(--muted);cursor:pointer;transition:transform .18s var(--ease),background .18s ease}.collection-delete:active{transform:scale(.86)}.collection-delete svg{width:14px;height:14px}.episode-list{display:grid;gap:10px}.episode{display:grid;grid-template-columns:72px minmax(0,1fr) 34px;align-items:center;gap:13px;width:100%;padding:10px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.82);box-shadow:0 7px 25px rgba(25,25,35,.04);text-decoration:none;color:inherit;transition:transform .2s var(--ease),opacity .2s ease}.episode:active{transform:scale(.985)}.art{width:72px;aspect-ratio:1;border-radius:15px;display:grid;place-items:center;color:white;font-size:23px;font-weight:800;letter-spacing:-.04em}.one{background:linear-gradient(145deg,#5b5ce2,#9b6cff)}.two{background:linear-gradient(145deg,#ff735f,#ffb45e)}.three{background:linear-gradient(145deg,#1c8f6d,#63c997)}.four{background:linear-gradient(145deg,#232329,#666674)}.podcast-name{margin:0 0 5px;color:var(--muted);font-size:12px;font-weight:650}.episode-title{margin:0;font-size:15px;font-weight:720;line-height:1.22;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta{display:flex;align-items:center;gap:8px;margin-top:9px;color:var(--muted);font-size:12px}.progress{flex:1;height:4px;border-radius:999px;background:#e9e9ed;overflow:hidden}.progress span{display:block;height:100%;border-radius:inherit;background:var(--accent)}.chevron{display:grid;place-items:center;color:#aaaab1}.collection-header{display:flex;align-items:center;gap:12px;margin-bottom:22px}.collection-title{display:flex;align-items:center;gap:14px}.collection-title .large-icon{width:54px;height:54px;border-radius:18px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center}.collection-title h1{font-size:32px}.empty{padding:42px 18px;text-align:center;color:var(--muted)}.bottom-nav{position:fixed;z-index:20;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,760px);display:grid;grid-template-columns:repeat(3,1fr);padding:10px 18px calc(10px + env(safe-area-inset-bottom));background:rgba(247,247,249,.84);border-top:1px solid var(--line);backdrop-filter:blur(24px) saturate(160%)}.nav-item{border:0;background:transparent;color:var(--muted);display:grid;justify-items:center;gap:4px;font-size:11px;font-weight:650;cursor:pointer}.nav-item.active{color:var(--accent)}.nav-item svg{width:21px;height:21px}.sheet-backdrop{position:fixed;inset:0;z-index:50;display:flex;align-items:end;justify-content:center;background:rgba(10,10,15,0);backdrop-filter:blur(0);pointer-events:none;transition:background .28s ease,backdrop-filter .28s ease}.sheet-backdrop.open{background:rgba(10,10,15,.28);backdrop-filter:blur(5px);pointer-events:auto}.sheet{width:min(100%,760px);border-radius:28px 28px 0 0;background:#fff;padding:12px 20px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(20,20,30,.15);transform:translateY(105%);opacity:.5;transition:transform .38s var(--ease),opacity .3s ease;max-height:88vh;overflow:auto}.sheet-backdrop.open .sheet{transform:none;opacity:1}.handle{width:38px;height:5px;border-radius:99px;background:#d8d8dc;margin:0 auto 18px}.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.sheet h3{margin:0;font-size:23px}.sheet input{width:100%;border:1px solid var(--line);border-radius:15px;padding:14px;outline:none;background:#f7f7f9;transition:border-color .2s ease,box-shadow .2s ease,transform .2s var(--ease)}.sheet input:focus{border-color:rgba(91,92,226,.35);box-shadow:0 0 0 4px rgba(91,92,226,.08);transform:translateY(-1px)}.icon-search{margin-top:12px}.icon-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-top:12px;max-height:250px;overflow:auto;padding:2px}.icon-choice{aspect-ratio:1;border:1px solid var(--line);border-radius:14px;background:#f8f8fa;color:var(--text);display:grid;place-items:center;cursor:pointer;transition:transform .18s var(--ease),border-color .18s ease,background .18s ease}.icon-choice:active{transform:scale(.9)}.icon-choice.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}.icon-choice svg{width:22px;height:22px}.primary{width:100%;border:0;border-radius:15px;padding:14px 16px;margin-top:14px;background:var(--accent);color:white;font-weight:750;cursor:pointer;transition:transform .18s var(--ease),filter .18s ease}.primary:active{transform:scale(.985);filter:brightness(.95)}.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translate(-50%,18px);z-index:70;opacity:0;pointer-events:none;background:rgba(24,24,29,.92);color:white;padding:10px 14px;border-radius:999px;font-size:13px;transition:.25s var(--ease)}.toast.show{opacity:1;transform:translate(-50%,0)}@media(min-width:620px){.groups{grid-template-columns:repeat(4,1fr)}.app{padding-inline:28px}}@media(prefers-color-scheme:dark){:root{color-scheme:dark;--bg:#111114;--card:rgba(29,29,34,.9);--text:#f5f5f7;--muted:#9898a1;--line:rgba(255,255,255,.08);--accent:#8d8dff;--accent-soft:rgba(141,141,255,.14)}.search,.episode{background:rgba(30,30,35,.84)}.progress{background:#35353c}.bottom-nav{background:rgba(20,20,24,.84)}.sheet{background:#1c1c20}.sheet input,.icon-choice{background:#27272c}.avatar,.icon-button{background:#25252a;color:var(--text)}}
  </style>
</head>
<body>
  <main class="app">
    <section id="libraryView" class="view active">
      <header class="topbar"><div><p class="eyebrow">YOUR PODCASTS</p><h1>Library</h1></div><button class="avatar" aria-label="Profile">S</button></header>
      <div class="search-wrap"><i data-lucide="search"></i><input id="collectionSearch" class="search" type="search" placeholder="Search collections" autocomplete="off"></div>
      <div class="section-head"><h2>Collections</h2><button id="addGroup" class="text-button">Add</button></div>
      <section id="groups" class="groups" aria-label="Collections"></section>
      <div id="noCollections" class="empty" hidden>No collections match your search.</div>
    </section>

    <section id="collectionView" class="view">
      <div class="collection-header"><button id="backButton" class="icon-button" aria-label="Back"><i data-lucide="chevron-left"></i></button><div class="collection-title"><div id="collectionLargeIcon" class="large-icon"><i data-lucide="library"></i></div><div><p class="eyebrow">COLLECTION</p><h1 id="collectionPageTitle">Collection</h1></div></div></div>
      <div class="search-wrap"><i data-lucide="search"></i><input id="episodeSearch" class="search" type="search" placeholder="Search this collection" autocomplete="off"></div>
      <section id="episodes" class="episode-list"></section>
      <div id="emptyCollection" class="empty" hidden>This collection is empty.</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation"><button id="libraryNav" class="nav-item active"><i data-lucide="library"></i>Library</button><button id="addEpisode" class="nav-item"><i data-lucide="circle-plus"></i>Add</button><button class="nav-item"><i data-lucide="user-round"></i>Profile</button></nav>

  <div id="sheetBackdrop" class="sheet-backdrop" role="dialog" aria-modal="true"><div class="sheet"><div class="handle"></div><div class="sheet-head"><h3 id="sheetTitle">New collection</h3><button id="closeSheet" class="icon-button" aria-label="Close"><i data-lucide="x"></i></button></div><input id="collectionName" placeholder="Collection name" maxlength="28"><div class="icon-search search-wrap"><i data-lucide="search"></i><input id="iconSearch" class="search" placeholder="Search icons" autocomplete="off"></div><div id="iconGrid" class="icon-grid"></div><button id="sheetSave" class="primary">Create collection</button></div></div>
  <div id="toast" class="toast">Saved</div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const iconNames=['library','heart','bookmark','clock','headphones','mic-2','music','radio','star','sparkles','flame','car','bike','plane','globe-2','briefcase','brain','book-open','film','tv','gamepad-2','coffee','dumbbell','leaf','lightbulb','rocket','camera','palette','message-circle','users','folder','archive','circle-play','list-music','podcast','newspaper','graduation-cap','badge-dollar-sign','wrench','cpu'];
    const sampleEpisodes=[
      {id:'e1',groups:['favorites'],show:'The Smoking Tire',title:'Engineering the perfect modern sports car',time:'38 min left',progress:62,art:'ST',artClass:'one',url:'https://open.spotify.com/search/The%20Smoking%20Tire'},
      {id:'e2',groups:['favorites'],show:'Waveform',title:'What the next generation of personal devices looks like',time:'1h 04m',progress:18,art:'WV',artClass:'two',url:'https://open.spotify.com/search/Waveform%20Podcast'},
      {id:'e3',groups:['later'],show:'Everyday Driver',title:'The best sports cars you can actually daily',time:'Not started',progress:0,art:'ED',artClass:'three',url:'https://open.spotify.com/search/Everyday%20Driver'},
      {id:'e4',groups:['all'],show:'Acquired',title:'The story behind Spotify and modern streaming',time:'Finished',progress:100,art:'AC',artClass:'four',url:'https://open.spotify.com/search/Acquired%20Spotify'}
    ];
    let collections=[{id:'all',name:'All Episodes',icon:'library'},{id:'favorites',name:'Favorites',icon:'heart'},{id:'later',name:'Listen Later',icon:'clock'}];
    let activeCollection=null,selectedIcon='library';
    const $=s=>document.querySelector(s);const groups=$('#groups');const libraryView=$('#libraryView');const collectionView=$('#collectionView');
    function countFor(id){return id==='all'?sampleEpisodes.length:sampleEpisodes.filter(e=>e.groups.includes(id)).length}
    function refreshIcons(){lucide.createIcons()}
    function renderCollections(term=''){
      groups.innerHTML='';const filtered=collections.filter(c=>c.name.toLowerCase().includes(term.toLowerCase()));
      filtered.forEach(c=>{const card=document.createElement('article');card.className='group-card';card.dataset.id=c.id;card.innerHTML=`<button class="collection-delete" aria-label="Delete ${c.name}"><i data-lucide="x"></i></button><span class="group-icon"><i data-lucide="${c.icon}"></i></span><strong>${c.name}</strong><span class="count">${countFor(c.id)} saved</span>`;card.addEventListener('click',e=>{if(!e.target.closest('.collection-delete'))openCollection(c.id)});card.querySelector('.collection-delete').addEventListener('click',e=>{e.stopPropagation();collections=collections.filter(x=>x.id!==c.id);renderCollections($('#collectionSearch').value);showToast('Collection removed')});groups.appendChild(card)});
      $('#noCollections').hidden=filtered.length>0;refreshIcons();
    }
    function showView(view){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));view.classList.add('active')}
    function openCollection(id){activeCollection=collections.find(c=>c.id===id);if(!activeCollection)return;$('#collectionPageTitle').textContent=activeCollection.name;$('#collectionLargeIcon').innerHTML=`<i data-lucide="${activeCollection.icon}"></i>`;$('#episodeSearch').value='';renderEpisodes();showView(collectionView);refreshIcons()}
    function renderEpisodes(){const term=$('#episodeSearch').value.toLowerCase();const list=activeCollection.id==='all'?sampleEpisodes:sampleEpisodes.filter(e=>e.groups.includes(activeCollection.id));const filtered=list.filter(e=>(e.show+' '+e.title).toLowerCase().includes(term));$('#episodes').innerHTML=filtered.map(e=>`<a class="episode" href="${e.url}" target="_blank" rel="noopener"><div class="art ${e.artClass}">${e.art}</div><div><p class="podcast-name">${e.show}</p><p class="episode-title">${e.title}</p><div class="meta"><span>${e.time}</span><div class="progress"><span style="width:${e.progress}%"></span></div></div></div><div class="chevron">›</div></a>`).join('');$('#emptyCollection').hidden=filtered.length>0}
    function renderIconGrid(term=''){const matches=iconNames.filter(n=>n.includes(term.toLowerCase()));$('#iconGrid').innerHTML=matches.map(n=>`<button class="icon-choice ${n===selectedIcon?'selected':''}" data-icon="${n}" title="${n}"><i data-lucide="${n}"></i></button>`).join('');document.querySelectorAll('.icon-choice').forEach(b=>b.addEventListener('click',()=>{selectedIcon=b.dataset.icon;renderIconGrid($('#iconSearch').value)}));refreshIcons()}
    function openSheet(){selectedIcon='library';$('#collectionName').value='';$('#iconSearch').value='';renderIconGrid();$('#sheetBackdrop').classList.add('open');setTimeout(()=>$('#collectionName').focus(),180)}
    function closeSheet(){ $('#sheetBackdrop').classList.remove('open') }
    function showToast(text){const t=$('#toast');t.textContent=text;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700)}
    $('#collectionSearch').addEventListener('input',e=>renderCollections(e.target.value));$('#episodeSearch').addEventListener('input',renderEpisodes);$('#addGroup').addEventListener('click',openSheet);$('#closeSheet').addEventListener('click',closeSheet);$('#sheetBackdrop').addEventListener('click',e=>{if(e.target.id==='sheetBackdrop')closeSheet()});$('#iconSearch').addEventListener('input',e=>renderIconGrid(e.target.value));$('#backButton').addEventListener('click',()=>showView(libraryView));$('#libraryNav').addEventListener('click',()=>showView(libraryView));$('#addEpisode').addEventListener('click',()=>showToast('Episode importer comes next'));
    $('#sheetSave').addEventListener('click',()=>{const name=$('#collectionName').value.trim();if(!name)return;collections.push({id:crypto.randomUUID(),name,icon:selectedIcon});renderCollections();closeSheet();showToast('Collection created')});
    renderCollections();refreshIcons();
  </script>
</body>
</html>
