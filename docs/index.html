<html lang="en">
<head>

  <style>
    :root{color-scheme:light;--bg:#f5f5f7;--card:rgba(255,255,255,.92);--text:#111114;--muted:#77777f;--line:rgba(20,20,25,.08);--accent:#5b5ce2;--soft:rgba(91,92,226,.12);--shadow:0 12px 35px rgba(30,30,40,.08);--ease:cubic-bezier(.22,1,.36,1)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif;background:radial-gradient(circle at top right,rgba(91,92,226,.08),transparent 34rem),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:calc(92px + env(safe-area-inset-bottom));overflow-x:hidden}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}.app{width:min(100%,760px);margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 18px 24px}.view{display:none;opacity:0;transform:translateX(18px)}.view.active{display:block;animation:viewIn .42s var(--ease) forwards}@keyframes viewIn{to{opacity:1;transform:none}}.topbar,.collection-header,.section-head,.sheet-head,.filter-row,.source-tabs{display:flex;align-items:center}.topbar{justify-content:space-between;gap:12px;margin-bottom:26px}.eyebrow{margin:0 0 4px;color:var(--muted);font-size:13px;font-weight:650;letter-spacing:.02em}h1{margin:0;font-size:clamp(30px,8vw,44px);line-height:.98;letter-spacing:-.045em}.avatar,.icon-button{border:0;background:rgba(255,255,255,.82);color:var(--text);box-shadow:var(--shadow);cursor:pointer;display:grid;place-items:center}.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(145deg,#212126,#65656f);color:white;font-weight:750}.icon-button{width:42px;height:42px;border-radius:14px}.search-wrap{position:relative;margin-bottom:20px}.search-wrap>svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}.search{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 16px 14px 44px;background:rgba(255,255,255,.74);color:var(--text);outline:none;box-shadow:0 4px 20px rgba(20,20,30,.035);backdrop-filter:blur(18px);transition:border-color .2s ease,box-shadow .2s ease,transform .2s var(--ease)}.search:focus{border-color:rgba(91,92,226,.35);box-shadow:0 0 0 4px rgba(91,92,22 pointer}.art{width:72px;aspect-ratio:1;border-radius:15px;display:grid;place-items:center;color:white;font-size:23px;font-weight:800;letter-spacing:-.04em}.one{background:linear-gradient(145deg,#5b5ce2,#9b6cff)}.two{background:linear-gradient(145deg,#ff735f,#ffb45e)}.three{background:linear-gradient(145deg,#1c8f6d,#63c997)}.four{background:linear-gradient(145deg,#232329,#666674)}.five{background:linear-gradient(145deg,#1688d4,#64b5f6)}.podcast-name{margin:0 0 5px;color:var(--muted);font-size:12px;font-weight:650}.episode-title{margin:0;font-size:15px;font-weight:720;line-height:1.22;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta{display:flex;align-items:center;gap:8px;margin-top:9px;color:var(--muted);font-size:12px}.source-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border-radius:999px;background:rgba(120,120,128,.12)}.source-badge svg{width:12px;height:12px}.progress{flex:1;height:4px;border-radius:999px;background:#e9e9ed;overflow:hidden}.progress span{display:block;height:100%;border-radius:inherit;background:var(--accent)}.chevron{display:grid;place-items:center;color:#aaaab1}.collection-header{gap:12px;margin-bottom:22px}.collection-title{display:flex;align-items:center;gap:14px;min-width:0}.collection-title .large-icon{width:54px;height:54px;border-radius:18px;color:white;display:grid;place-items:center;flex:0 0 auto}.collection-title h1{font-size:32px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.collection-actions{margin-left:auto;position:relative}.filter-button.active{color:var(--accent);background:var(--soft)}.filter-popover{position:absolute;right:0;top:50px;width:220px;padding:10px;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 45px rgba(20,20,30,.15);opacity:0;transform:translateY(-8px) scale(.96);pointer-events:none;transition:.22s var(--ease);z-index:15}.filter-popover.open{opacity:1;transform:none;pointer-events:auto}.filter-row{gap:10px;padding:10px;border-radius:12px;cursor:pointer}.filter-row:hover{background:rgba(120,120,128,.08)}.filter-row input{width:18px;height:18px;accent-color:var(--accent)}.empty{padding:42px 18px;text-align:center;color:var(--muted)}.bottom-nav{position:fixed;z-index:20;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,760px);display:grid;grid-template-columns:repeat(3,1fr);padding:10px 18px calc(10px + env(safe-area-inset-bottom));background:rgba(247,247,249,.84);border-top:1px solid var(--line);backdrop-filter:blur(24px) saturate(160%)}.nav-item{border:0;background:transparent;color:var(--muted);display:grid;justify-items:center;gap:4px;font-size:11px;font-weight:650;cursor:pointer}.nav-item.active{color:var(--accent)}.nav-item svg{width:21px;height:21px}.sheet-backdrop{position:fixed;inset:0;z-index:50;display:flex;align-items:end;justify-content:center;background:rgba(10,10,15,0);backdrop-filter:blur(0);pointer-events:none;transition:background .28s ease,backdrop-filter .28s ease}.sheet-backdrop.open{background:rgba(10,10,15,.28);backdrop-filter:blur(5px);pointer-events:auto}.sheet{width:min(100%,760px);border-radius:28px 28px 0 0;background:#fff;padding:12px 20px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(20,20,30,.15);transform:translateY(105%);opacity:.5;transition:transform .38s var(--ease),opacity .3s ease;max-height:90vh;overflow:auto}.sheet-backdrop.open .sheet{transform:none;opacity:1}.handle{width:38px;height:5px;border-radius:99px;background:#d8d8dc;margin:0 auto 18px}.sheet-head{justify-content:space-between;margin-bottom:14px}.sheet h3{margin:0;font-size:23px}.sheet input[type="text"],.sheet input[type="url"],.sheet input[type="search"],.sheet input[type="file"]{width:100%;border:1px solid var(--line);border-radius:15px;padding:14px;outline:none;background:#f7f7f9;transition:border-color .2s ease,box-shadow .2s ease,transform .2s var(--ease)}.sheet input:focus{border-color:rgba(91,92,226,.35);box-shadow:0 0 0 4px rgba(91,92,226,.08);transform:translateY(-1px)}.icon-search{margin-top:12px}.icon-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-top:12px;max-height:210px;overflow:auto;padding:2px}.icon-choice,.color-choice,.source-tab{border:1px solid var(--line);background:#f8f8fa;color:var(--text);cursor:pointer;transition:transform .18s var(--ease),border-color .18s ease,background .18s ease}.icon-choice{aspect-ratio:1;border-radius:14px;display:grid;place-items:center}.icon-choice.selected{border-color:var(--accent);background:var(--soft);color:var(--accent)}.icon-choice svg{width:22px;height:22px}.color-label{display:block;margin-top:16px;font-size:13px;font-weight:700;color:var(--muted)}.color-grid{display:flex;gap:10px;margin-top:9px;flex-wrap:wrap}.color-choice{width:34px;height:34px;border-radius:50%;background:var(--swatch);box-shadow:inset 0 0 0 3px white}.color-choice.selected{outline:3px solid color-mix(in srgb,var(--swatch),transparent 55%);transform:scale(1.08)}.source-tabs{gap:8px;margin-bottom:14px}.source-tab{flex:1;padding:11px;border-radius:14px;font-weight:700}.source-tab.selected{border-color:var(--accent);background:var(--soft);color:var(--accent)}.field-group{display:grid;gap:10px}.field-group[hidden]{display:none}.primary,.secondary{width:100%;border:0;border-radius:15px;padding:14px 16px;margin-top:14px;font-weight:750;cursor:pointer;transition:transform .18s var(--ease),filter .18s ease}.primary{background:var(--accent);color:white}.secondary{background:rgba(120,120,128,.12);color:var(--text)}.primary:active,.secondary:active{transform:scale(.985)}.player-frame{width:100%;height:152px;border:0;border-radius:16px;margin-top:8px}.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translate(-50%,18px);z-index:70;opacity:0;pointer-events:none;background:rgba(24,24,29,.92);color:white;padding:10px 14px;border-radius:999px;font-size:13px;transition:.25s var(--ease)}.toast.show{opacity:1;transform:translate(-50%,0)}@media(min-width:620px){.groups{grid-template-columns:repeat(4,1fr)}.app{padding-inline:28px}}@media(prefers-color-scheme:dark){:root{color-scheme:dark;--bg:#111114;--card:rgba(29,29,34,.94);--text:#f5f5f7;--muted:#9898a1;--line:rgba(255,255,255,.08);--accent:#8d8dff;--soft:rgba(141,141,255,.14)}.search,.episode{background:rgba(30,30,35,.86)}.progress{background:#35353c}.bottom-nav{background:rgba(20,20,24,.84)}.sheet{background:#1c1c20}.sheet input,.icon-choice,.source-tab{background:#27272c}.avatar,.icon-button{background:#25252a;color:var(--text)}.color-choice{box-shadow:inset 0 0 0 3px #1c1c20}}
  </style>
</head>
<body>
  <main class="app">
    <section id="libraryView" class="view active">
      <header class="topbar"><div><p class="eyebrow">YOUR PODCASTS</p><h1>Library</h1></div><button class="avatar" aria-label="Profile">S</button></header>
      <div class="search-wrap"><i data-lucide="search"></i><input id="collectionSearch" class="search" type="search" placeholder="Search collections" autocomplete="off"></div>
      <div class="section-head"><h2>Collections</h2><button id="addGroup" class="text-button">Add</button></div>
      <section id="groups" class="groups" aria-label="Collections"></section>
      <div id="noCollections" class="empty" hidden>No collections match your search.</div>
      <div class="section-head"><h2>Recently Saved</h2></div>
      <section id="recentEpisodes" class="episode-list"></section>
    </section>

    <section id="collectionView" class="view">
      <div class="collection-header">
        <button id="backButton" class="icon-button" aria-label="Back"><i data-lucide="chevron-left"></i></button>
        <div class="collection-title"><div id="collectionLargeIcon" class="large-icon"><i data-lucide="library"></i></div><div><p class="eyebrow">COLLECTION</p><h1 id="collectionPageTitle">Collection</h1></div></div>
        <div class="collection-actions"><button id="filterButton" class="icon-button filter-button" aria-label="Filter episodes"><i data-lucide="list-filter"></i></button><div id="filterPopover" class="filter-popover"><label class="filter-row"><input id="showSpotify" type="checkbox" checked><i data-lucide="radio"></i><span>Spotify</span></label><label class="filter-row"><input id="showLocal" type="checkbox" checked><i data-lucide="file-audio"></i><span>Local uploads</span></label></div></div>
      </div>
      <div class="search-wrap"><i data-lucide="search"></i><input id="episodeSearch" class="search" type="search" placeholder="Search this collection" autocomplete="off"></div>
      <section id="episodes" class="episode-list"></section>
      <div id="emptyCollection" class="empty" hidden>This collection is empty.</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation"><button id="libraryNav" class="nav-item active"><i data-lucide="library"></i>Library</button><button id="addEpisode" class="nav-item"><i data-lucide="circle-plus"></i>Add</button><button class="nav-item"><i data-lucide="user-round"></i>Profile</button></nav>

  <div id="collectionSheet" class="sheet-backdrop"><div class="sheet"><div class="handle"></div><div class="sheet-head"><h3>New collection</h3><button class="icon-button close-sheet" aria-label="Close"><i data-lucide="x"></i></button></div><input id="collectionName" type="text" placeholder="Collection name" maxlength="28"><div class="icon-search search-wrap"><i data-lucide="search"></i><input id="iconSearch" class="search" type="search" placeholder="Search icons" autocomplete="off"></div><div id="iconGrid" class="icon-grid"></div><span class="color-label">Icon color</span><div id="colorGrid" class="color-grid"></div><button id="createCollection" class="primary">Create collection</button></div></div>

  <div id="episodeSheet" class="sheet-backdrop"><div class="sheet"><div class="handle"></div><div class="sheet-head"><h3>Add podcast media</h3><button class="icon-button close-sheet" aria-label="Close"><i data-lucide="x"></i></button></div><div class="source-tabs"><button class="source-tab selected" data-source="spotify"><i data-lucide="link"></i> Spotify link</button><button class="source-tab" data-source="local"><i data-lucide="upload"></i> Upload audio</button></div><div id="spotifyFields" class="field-group"><input id="spotifyUrl" type="url" placeholder="Spotify episode link"><input id="spotifyTitle" type="text" placeholder="Episode title"></div><div id="localFields" class="field-group" hidden><input id="audioFile" type="file" accept="audio/*"><input id="localTitle" type="text" placeholder="Episode title"></div><button id="saveEpisode" class="primary">Add episode</button></div></div>

  <div id="playSheet" class="sheet-backdrop"><div class="sheet"><div class="handle"></div><div class="sheet-head"><h3 id="playTitle">Play episode</h3><button class="icon-button close-sheet" aria-label="Close"><i data-lucide="x"></i></button></div><div id="playerMount"></div><button id="playHere" class="primary"><i data-lucide="play"></i> Play in app</button><button id="openSpotify" class="secondary"><i data-lucide="external-link"></i> Open in Spotify</button></div></div>

  <div id="toast" class="toast">Saved</div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
    const iconNames=['library','heart','bookmark','clock','headphones','mic-2','music','radio','star','sparkles','flame','bike','plane','globe-2','briefcase','brain','book-open','film','tv','gamepad-2','coffee','dumbbell','leaf','lightbulb','rocket','camera','palette','message-circle','users','folder','archive','circle-play','list-music','podcast','newspaper','graduation-cap','badge-dollar-sign','wrench','cpu'];
    const colors=['#5b5ce2','#ff6b6b','#f59e0b','#10b981','#0ea5e9','#8b5cf6','#ec4899','#334155'];
    let episodes=[
      {id:'e1',groups:['favorites'],source:'spotify',show:'The Smoking Tire',title:'Engineering the perfect modern sports car',time:'38 min left',progress:62,art:'ST',artClass:'one',url:'https://open.spotify.com/episode/3A0n9M7zQmY8GX8example',embed:'https://open.spotify.com/embed/episode/3A0n9M7zQmY8GX8example',savedAt:5},
      {id:'e2',groups:['favorites'],source:'spotify',show:'Waveform',title:'What the next generation of personal devices looks like',time:'1h 04m',progress:18,art:'WV',artClass:'two',url:'https://open.spotify.com/search/Waveform%20Podcast',embed:'https://open.spotify.com/embed/show/6o81QuW22s5m2nfcXWjucc',savedAt:4},
      {id:'e3',groups:['later'],source:'local',show:'Local upload',title:'Garage notes — suspension setup',time:'Not started',progress:0,art:'GN',artClass:'three',savedAt:3},
      {id:'e4',groups:['all'],source:'spotify',show:'Acquired',title:'The story behind Spotify and modern streaming',time:'Finished',progress:100,art:'AC',artClass:'four',url:'https://open.spotify.com/search/Acquired%20Spotify',embed:'https://open.spotify.com/embed/show/7Fj0XEuUQLUqoMZQdsLXqp',savedAt:2},
      {id:'e5',groups:['later'],source:'local',show:'Local upload',title:'Sample uploaded podcast episode',time:'12 min',progress:0,art:'UP',artClass:'five',savedAt:1}
    ];
    let collections=[{id:'all',name:'All Episodes',icon:'library',color:'#5b5ce2'},{id:'favorites',name:'Favorites',icon:'heart',color:'#ec4899'},{id:'later',name:'Listen Later',icon:'clock',color:'#0ea5e9'}];
    let activeCollection=null,selectedIcon='library',selectedColor=colors[0],addSource='spotify',selectedEpisode=null;
    const groups=$('#groups'),libraryView=$('#libraryView'),collectionView=$('#collectionView');
    const refreshIcons=()=>lucide.createIcons();
    const countFor=id=>id==='all'?episodes.length:episodes.filter(e=>e.groups.includes(id)).length;
    const showToast=text=>{const t=$('#toast');t.textContent=text;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700)};
    function episodeMarkup(e){return `<article class="episode" data-id="${e.id}"><button class="episode-delete" aria-label="Remove episode"><i data-lucide="x"></i></button><div class="episode-main"><div class="art ${e.artClass}">${e.art}</div><div><p class="podcast-name">${e.show}</p><p class="episode-title">${e.title}</p><div class="meta"><span class="source-badge"><i data-lucide="${e.source==='spotify'?'radio':'file-audio'}"></i>${e.source==='spotify'?'Spotify':'Local'}</span><span>${e.time}</span><div class="progress"><span style="width:${e.progress}%"></span></div></div></div><div class="chevron">›</div></div></article>`}
    function wireEpisodeCards(container){container.querySelectorAll('.episode').forEach(card=>{const id=card.dataset.id;card.querySelector('.episode-delete').addEventListener('click',e=>{e.stopPropagation();episodes=episodes.filter(x=>x.id!==id);renderRecent();if(activeCollection)renderEpisodes();renderCollections($('#collectionSearch').value);showToast('Episode removed')});card.querySelector('.episode-main').addEventListener('click',()=>{const ep=episodes.find(x=>x.id===id);if(ep?.source==='spotify')openPlaySheet(ep);else showToast('Local player UI comes next')})});refreshIcons()}
    function renderRecent(){const recent=[...episodes].sort((a,b)=>b.savedAt-a.savedAt).slice(0,5);$('#recentEpisodes').innerHTML=recent.map(episodeMarkup).join('');wireEpisodeCards($('#recentEpisodes'))}
    function renderCollections(term=''){groups.innerHTML='';const filtered=collections.filter(c=>c.name.toLowerCase().includes(term.toLowerCase()));filtered.forEach(c=>{const card=document.createElement('article');card.className='group-card';card.dataset.id=c.id;card.draggable=true;card.innerHTML=`<button class="drag-handle" aria-label="Move ${c.name}"><i data-lucide="grip-vertical"></i></button><button class="collection-delete" aria-label="Delete ${c.name}"><i data-lucide="x"></i></button><span class="group-icon" style="background:${c.color}"><i data-lucide="${c.icon}"></i></span><strong>${c.name}</strong><span class="count">${countFor(c.id)} saved</span>`;card.addEventListener('click',e=>{if(!e.target.closest('button'))openCollection(c.id)});card.querySelector('.collection-delete').addEventListener('click',e=>{e.stopPropagation();collections=collections.filter(x=>x.id!==c.id);renderCollections($('#collectionSearch').value);showToast('Collection removed')});enableDrag(card);groups.appendChild(card)});$('#noCollections').hidden=filtered.length>0;refreshIcons()}
    function enableDrag(card){card.addEventListener('dragstart',()=>card.classList.add('dragging'));card.addEventListener('dragend',()=>{card.classList.remove('dragging');$$('.group-card').forEach(x=>x.classList.remove('drag-over'));syncCollectionOrder()});card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');const dragging=$('.group-card.dragging');if(dragging&&dragging!==card){const r=card.getBoundingClientRect();groups.insertBefore(dragging,e.clientY<r.top+r.height/2?card:card.nextSibling)}});card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));const handle=card.querySelector('.drag-handle');let moving=false;handle.addEventListener('pointerdown',e=>{moving=true;card.setPointerCapture(e.pointerId);card.classList.add('dragging');e.stopPropagation()});handle.addEventListener('pointermove',e=>{if(!moving)return;const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.group-card');if(target&&target!==card){const r=target.getBoundingClientRect();groups.insertBefore(card,e.clientY<r.top+r.height/2?target:target.nextSibling)}});handle.addEventListener('pointerup',()=>{moving=false;card.classList.remove('dragging');syncCollectionOrder()})}
    function syncCollectionOrder(){const order=$$('.group-card').map(x=>x.dataset.id);collections.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));showToast('Collection order updated')}
    function showView(view){$$('.view').forEach(v=>v.classList.remove('active'));view.classList.add('active')}
    function openCollection(id){activeCollection=collections.find(c=>c.id===id);if(!activeCollection)return;$('#collectionPageTitle').textContent=activeCollection.name;$('#collectionLargeIcon').style.background=activeCollection.color;$('#collectionLargeIcon').innerHTML=`<i data-lucide="${activeCollection.icon}"></i>`;$('#episodeSearch').value='';$('#showSpotify').checked=true;$('#showLocal').checked=true;renderEpisodes();showView(collectionView);refreshIcons()}
    function renderEpisodes(){const term=$('#episodeSearch').value.toLowerCase(),showS=$('#showSpotify').checked,showL=$('#showLocal').checked;let list=activeCollection.id==='all'?episodes:episodes.filter(e=>e.groups.includes(activeCollection.id));list=list.filter(e=>(e.show+' '+e.title).toLowerCase().includes(term)&&(e.source==='spotify'?showS:showL));$('#episodes').innerHTML=list.map(episodeMarkup).join('');$('#emptyCollection').hidden=list.length>0;wireEpisodeCards($('#episodes'));$('#filterButton').classList.toggle('active',!(showS&&showL))}
    function renderIconGrid(term=''){const matches=iconNames.filter(n=>n.includes(term.toLowerCase()));$('#iconGrid').innerHTML=matches.map(n=>`<button class="icon-choice ${n===selectedIcon?'selected':''}" data-icon="${n}" title="${n}"><i data-lucide="${n}"></i></button>`).join('');$$('.icon-choice').forEach(b=>b.addEventListener('click',()=>{selectedIcon=b.dataset.icon;renderIconGrid($('#iconSearch').value)}));refreshIcons()}
    function renderColors(){$('#colorGrid').innerHTML=colors.map(c=>`<button class="color-choice ${c===selectedColor?'selected':''}" style="--swatch:${c}" data-color="${c}" aria-label="Choose ${c}"></button>`).join('');$$('.color-choice').forEach(b=>b.addEventListener('click',()=>{selectedColor=b.dataset.color;renderColors()}))}
    function openSheet(id){$(id).classList.add('open')}function closeSheets(){$$('.sheet-backdrop').forEach(s=>s.classList.remove('open'));$('#playerMount').innerHTML=''}
    function openPlaySheet(ep){selectedEpisode=ep;$('#playTitle').textContent=ep.title;$('#playerMount').innerHTML='';$('#playHere').hidden=false;openSheet('#playSheet')}
    $('#playHere').addEventListener('click',()=>{if(!selectedEpisode)return;$('#playerMount').innerHTML=`<iframe class="player-frame" src="${selectedEpisode.embed}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;$('#playHere').hidden=true});
    $('#openSpotify').addEventListener('click',()=>{if(selectedEpisode?.url)window.open(selectedEpisode.url,'_blank')});
    $('#collectionSearch').addEventListener('input',e=>renderCollections(e.target.value));$('#episodeSearch').addEventListener('input',renderEpisodes);$('#showSpotify').addEventListener('change',renderEpisodes);$('#showLocal').addEventListener('change',renderEpisodes);$('#filterButton').addEventListener('click',e=>{e.stopPropagation();$('#filterPopover').classList.toggle('open')});document.addEventListener('click',e=>{if(!e.target.closest('.collection-actions'))$('#filterPopover').classList.remove('open')});
    $('#addGroup').addEventListener('click',()=>{selectedIcon='library';selectedColor=colors[0];$('#collectionName').value='';$('#iconSearch').value='';renderIconGrid();renderColors();openSheet('#collectionSheet')});$('#addEpisode').addEventListener('click',()=>{addSource='spotify';$$('.source-tab').forEach((b,i)=>b.classList.toggle('selected',i===0));$('#spotifyFields').hidden=false;$('#localFields').hidden=true;openSheet('#episodeSheet')});$$('.close-sheet').forEach(b=>b.addEventListener('click',closeSheets));$$('.sheet-backdrop').forEach(s=>s.addEventListener('click',e=>{if(e.target===s)closeSheets()}));$('#iconSearch').addEventListener('input',e=>renderIconGrid(e.target.value));$('#backButton').addEventListener('click',()=>showView(libraryView));$('#libraryNav').addEventListener('click',()=>showView(libraryView));
    $$('.source-tab').forEach(b=>b.addEventListener('click',()=>{addSource=b.dataset.source;$$('.source-tab').forEach(x=>x.classList.toggle('selected',x===b));$('#spotifyFields').hidden=addSource!=='spotify';$('#localFields').hidden=addSource!=='local'}));
    $('#createCollection').addEventListener('click',()=>{const name=$('#collectionName').value.trim();if(!name)return;collections.push({id:crypto.randomUUID(),name,icon:selectedIcon,color:selectedColor});renderCollections();closeSheets();showToast('Collection created')});
    $('#saveEpisode').addEventListener('click',()=>{const title=(addSource==='spotify'?$('#spotifyTitle').value:$('#localTitle').value).trim()||'Untitled episode';const id=crypto.randomUUID();episodes.unshift({id,groups:activeCollection&&activeCollection.id!=='all'?[activeCollection.id]:['all'],source:addSource,show:addSource==='spotify'?'Spotify':'Local upload',title,time:'Not started',progress:0,art:addSource==='spotify'?'SP':'UP',artClass:addSource==='spotify'?'one':'five',url:$('#spotifyUrl').value||'https://open.spotify.com',embed:'https://open.spotify.com/embed/show/7Fj0XEuUQLUqoMZQdsLXqp',savedAt:Date.now()});renderRecent();renderCollections();if(activeCollection)renderEpisodes();closeSheets();showToast('Episode added')});
    renderCollections();renderRecent();refreshIcons();
  </script>
</body>
</html>
